server {
    listen 80;
    client_max_body_size 10M;

    # DNS Docker embarqué : évite le 502 après recréation des conteneurs (IP obsolète en cache).
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/agents/ {
        set $agents_upstream agents-service:8000;
        proxy_pass http://$agents_upstream$request_uri;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/users/ {
        set $users_upstream users-service:8000;
        proxy_pass http://$users_upstream$request_uri;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        set $users_media_upstream users-service:8000;
        proxy_pass http://$users_media_upstream$request_uri;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Formulaire contact site → service notification (HTTP embarqué).
    location /api/notifications/public/ {
        set $notif_upstream notification-service:8090;
        rewrite ^/api/notifications/public/(.*)$ /public/$1 break;
        proxy_pass http://$notif_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Plus spécifique que /health/ : doit rester avant.
    location /health/users/ {
        set $users_h users-service:8000;
        rewrite ^/health/users/?$ /health/live break;
        rewrite ^/health/users/(.*)$ /health/$1 break;
        proxy_pass http://$users_h;
    }

    location /health/ {
        set $agents_h agents-service:8000;
        proxy_pass http://$agents_h$request_uri;
    }
}
