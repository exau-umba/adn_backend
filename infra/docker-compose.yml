services:
  gateway:
    image: nginx:1.27-alpine
    container_name: adn_gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - agents_service

  agents-service:
    build:
      context: ../services/agents_service
    container_name: adn_agents_service
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - ../services/agents_service/.env.example
    volumes:
      - ../services/agents_service:/app
    depends_on:
      - agents_db
      - redis
      - rabbitmq

  agents_db:
    image: postgres:16-alpine
    container_name: adn_agents_db
    environment:
      POSTGRES_DB: agents_db
      POSTGRES_USER: agents_user
      POSTGRES_PASSWORD: agents_password
    ports:
      - "5434:5432"
    volumes:
      - agents_db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: adn_redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: adn_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  celery_agents:
    build:
      context: ../services/agents_service
    container_name: adn_celery_agents
    command: celery -A config worker --loglevel=info
    env_file:
      - ../services/agents_service/.env.example
    volumes:
      - ../services/agents_service:/app
    depends_on:
      - agents-service
      - redis

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: adn_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.5
    container_name: adn_grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  agents_db_data:
