services:
  gateway:
    image: nginx:1.27-alpine
    container_name: adn_gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - agents-service
      - users-service
      - notification-service

  agents-service:
    build:
      context: ../services/agents_service
    container_name: adn_agents_service
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - ../services/agents_service/.env.example
    volumes:
      - ../services/agents_service:/app
    depends_on:
      agents_db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  agents_db:
    image: postgres:16-alpine
    container_name: adn_agents_db
    environment:
      POSTGRES_DB: agents_db
      POSTGRES_USER: agents_user
      POSTGRES_PASSWORD: agents_password
    ports:
      - "5434:5432"
    volumes:
      - agents_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agents_user -d agents_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  users-service:
    build:
      context: ../services/users_service
    container_name: adn_users_service
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - ../services/users_service/.env.example
    volumes:
      - ../services/users_service:/app
      - users_media_data:/app/media
    depends_on:
      users_db:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  users_db:
    image: postgres:16-alpine
    container_name: adn_users_db
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: users_user
      POSTGRES_PASSWORD: users_password
    ports:
      - "5435:5432"
    volumes:
      - users_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U users_user -d users_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: adn_redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: adn_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  notification-service:
    build:
      context: ../services/notification_service
    container_name: adn_notification_service
    command: python consumer.py
    env_file:
      - ../services/notification_service/.env.example
      - ../services/notification_service/.env
    environment:
      ENABLE_MAIL_TEST_API: "true"
      MAIL_TEST_API_PORT: "8090"
    ports:
      - "8090:8090"
    volumes:
      - ../services/notification_service:/app
    depends_on:
      rabbitmq:
        condition: service_started

  celery_agents:
    build:
      context: ../services/agents_service
    container_name: adn_celery_agents
    command: celery -A config worker --loglevel=info
    env_file:
      - ../services/agents_service/.env.example
    volumes:
      - ../services/agents_service:/app
    depends_on:
      - agents-service
      - redis

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: adn_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.5
    container_name: adn_grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  agents_db_data:
  users_db_data:
  users_media_data:
